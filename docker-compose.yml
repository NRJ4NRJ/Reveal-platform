version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: safetyskill
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/safetyskill
      JWT_SECRET: change_me_super_secret_jwt_key_32chars_min_prod
      JWT_REFRESH_SECRET: change_me_refresh_secret_key_32chars_min_prod
      PORT: 4000
      UPLOAD_DIR: /app/uploads
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: "noreply@safetyskilltrack.com"
      FRONTEND_URL: "http://localhost:3000"
    volumes:
      - uploads:/app/uploads
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/safetyskill
    command: sh -c "npx prisma db push && npx ts-node prisma/seed.ts"
    profiles: ["setup"]

  test:
    build:
      context: ./backend
      target: builder
    command: npm test
    profiles: ["test"]

volumes:
  pgdata:
  uploads:
