version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NEXTAUTH_URL=http://127.0.0.1:3000
      - HOSTNAME=0.0.0.0
      - PYTHON_SERVICE_URL=http://analysis-service:8000
    depends_on:
      - analysis-service
    restart: unless-stopped

  analysis-service:
    build:
      context: ..
      dockerfile: REVEAL-platform/analysis-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - WEATHER_CACHE_PATH=/app/cache/weather_cache.json
      - LONG_TERM_CACHE_DIR=/app/cache/long-term
      - CDS_API_URL=${CDS_API_URL}
      - CDS_API_KEY=${CDS_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - weather_cache:/app/cache
    restart: unless-stopped

volumes:
  weather_cache:
